version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: chezmoi-recipes
    main: ./cmd/chezmoi-recipes
    binary: chezmoi-recipes
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/fgrehm/chezmoi-recipes/cmd/chezmoi-recipes/cmd.version={{.Version}}
      - -X github.com/fgrehm/chezmoi-recipes/cmd/chezmoi-recipes/cmd.commit={{.ShortCommit}}
      - -X github.com/fgrehm/chezmoi-recipes/cmd/chezmoi-recipes/cmd.date={{.Date}}

archives:
  - id: chezmoi-recipes
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
